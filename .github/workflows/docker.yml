name: docker

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tag: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: shayonj
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: shayonj/magicfs:${{ matrix.tag }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: shayonj
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: |
          docker buildx imagetools create -t shayonj/magicfs:latest \
            shayonj/magicfs:amd64 shayonj/magicfs:arm64
